name: Apply answer UI cleanup

on:
  push:
    branches:
      - agent/add-production-rewarded-ads
    paths:
      - .github/workflows/apply-answer-ui-cleanup.yml

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/add-production-rewarded-ads
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make answer checking free and improve solution dialogs
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("app/src/main/java/com/example/ui/CasePlayScreen.kt")
          text = path.read_text(encoding="utf-8")

          old_answer = '''                    Button(
                        onClick = {
                            rewardedAdManager.showRewardedAd(
                                purpose = RewardedAdPurpose.CHECK_ANSWER,
                                onRewardEarned = { viewModel.makeAccusation() }
                            )
                        },
                        colors = ButtonDefaults.buttonColors(containerColor = BloodRed),
                        modifier = Modifier
                            .weight(1f)
                            .testTag("accuse_button"),
                        shape = RoundedCornerShape(8.dp),
                        enabled = chosenSuspect.isNotEmpty() && chosenWeapon.isNotEmpty() && chosenLocation.isNotEmpty() && (!case.hasLiar || chosenLiar.isNotEmpty())
                    ) {
                        Icon(Icons.Default.Gavel, contentDescription = "Gavel symbol", tint = Color.White)
                        Spacer(modifier = Modifier.width(8.dp))
                        Text("WATCH AD TO CHECK ANSWER", color = Color.White, fontWeight = FontWeight.Bold, fontFamily = FontFamily.Monospace)
                    }'''
          new_answer = '''                    Button(
                        onClick = { viewModel.makeAccusation() },
                        colors = ButtonDefaults.buttonColors(containerColor = BloodRed),
                        modifier = Modifier
                            .weight(1f)
                            .testTag("accuse_button"),
                        shape = RoundedCornerShape(8.dp),
                        enabled = chosenSuspect.isNotEmpty() && chosenWeapon.isNotEmpty() && chosenLocation.isNotEmpty() && (!case.hasLiar || chosenLiar.isNotEmpty())
                    ) {
                        Icon(Icons.Default.Gavel, contentDescription = "Check answer", tint = Color.White)
                        Spacer(modifier = Modifier.width(8.dp))
                        Text("CHECK ANSWER", color = Color.White, fontWeight = FontWeight.Bold, fontFamily = FontFamily.Monospace)
                    }'''
          if old_answer not in text:
              raise SystemExit("Expected rewarded answer-check block was not found")
          text = text.replace(old_answer, new_answer, 1)

          old_duplicate = '''                    Text(
                        text = "CASE EXPLANATION",
                        style = MaterialTheme.typography.labelSmall,
                        fontFamily = FontFamily.Monospace,
                        color = NoirAmber,
                        fontWeight = FontWeight.Bold
                    )

                    Text(
                        text = "CASE EXPLANATION",
                        style = MaterialTheme.typography.labelMedium,
                        fontFamily = FontFamily.Monospace,
                        fontWeight = FontWeight.Bold,
                        color = NoirAmber
                    )'''
          new_heading = '''                    Text(
                        text = "CASE EXPLANATION",
                        style = MaterialTheme.typography.labelMedium,
                        fontFamily = FontFamily.Monospace,
                        fontWeight = FontWeight.Bold,
                        color = NoirAmber
                    )'''
          if old_duplicate not in text:
              raise SystemExit("Expected duplicate explanation headings were not found")
          text = text.replace(old_duplicate, new_heading, 1)

          old_dialog_column = '''            text = {
                Column(verticalArrangement = Arrangement.spacedBy(12.dp)) {'''
          new_dialog_column = '''            text = {
                Column(
                    modifier = Modifier
                        .heightIn(max = 520.dp)
                        .verticalScroll(rememberScrollState()),
                    verticalArrangement = Arrangement.spacedBy(12.dp)
                ) {'''
          if text.count(old_dialog_column) != 2:
              raise SystemExit(f"Expected two solution dialog columns, found {text.count(old_dialog_column)}")
          text = text.replace(old_dialog_column, new_dialog_column)

          old_reveal_text = 'text = "WATCH AD TO SEE CORRECT ANSWER"'
          new_reveal_text = 'text = "WATCH AD TO REVEAL FULL SOLUTION"'
          if old_reveal_text not in text:
              raise SystemExit("Expected solution reveal label was not found")
          text = text.replace(old_reveal_text, new_reveal_text, 1)

          if "RewardedAdPurpose.CHECK_ANSWER" in text or "WATCH AD TO CHECK ANSWER" in text:
              raise SystemExit("Obsolete rewarded answer-check references remain")

          path.write_text(text, encoding="utf-8")
          PY

      - name: Run unit tests and debug build
        run: |
          chmod +x gradlew
          ./gradlew :app:testDebugUnitTest :app:assembleDebug

      - name: Commit verified cleanup
        run: |
          rm .github/workflows/apply-answer-ui-cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/example/ui/CasePlayScreen.kt .github/workflows/apply-answer-ui-cleanup.yml
          git commit -m "Make answer checking free"
          git push origin HEAD:agent/add-production-rewarded-ads
